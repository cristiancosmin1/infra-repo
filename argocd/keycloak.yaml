apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: keycloak
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/cristiancosmin1/infra-repo.git
    targetRevision: main
    path: charts/keycloak

    helm:
      releaseName: keycloak

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

  revisionHistoryLimit: 5
