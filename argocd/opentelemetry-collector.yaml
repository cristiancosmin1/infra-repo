apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: opentelemetry-collector
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/cristiancosmin1/infra-repo.git
    targetRevision: main
    path: charts/opentelemetry-collector

    helm:
      releaseName: opentelemetry

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

  revisionHistoryLimit: 5
