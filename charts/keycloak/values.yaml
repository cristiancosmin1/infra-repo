keycloakx:
  replicas: 1

  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.6.4"
    pullPolicy: IfNotPresent

  command:
    - "/opt/keycloak/bin/kc.sh"

  args:
    - "start-dev"
    - "--hostname=https://auth.local"
    - "--proxy-headers=xforwarded"
    - "--http-enabled=true"
    - "--health-enabled=true"
    - "--metrics-enabled=true"

  extraEnvFrom: |
    - secretRef:
        name: keycloak-admin

  http:
    relativePath: "/"

  proxy:
    enabled: true
    mode: xforwarded

  health:
    enabled: true

  metrics:
    enabled: true

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  ingress:
    enabled: true
    ingressClassName: nginx

    annotations:
      cert-manager.io/cluster-issuer: selfsigned-clusterissuer
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"

    rules:
      - host: auth.local
        paths:
          - path: /
            pathType: Prefix

    tls:
      - hosts:
          - auth.local
        secretName: keycloak-tls

  networkPolicy:
    enabled: false

  autoscaling:
    enabled: false

  test:
    enabled: false
