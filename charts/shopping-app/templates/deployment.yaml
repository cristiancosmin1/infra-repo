apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "shopping-app.fullname" . }}

  labels:
    {{- include "shopping-app.labels" . | nindent 4 }}

spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}

  selector:
    matchLabels:
      {{- include "shopping-app.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "shopping-app.selectorLabels" . | nindent 8 }}

    spec:
      containers:
        - name: shopping-app

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopping-app.fullname" . }}-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopping-app.fullname" . }}-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopping-app.fullname" . }}-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shopping-app-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopping-app-secret
                  key: DB_PASSWORD

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
