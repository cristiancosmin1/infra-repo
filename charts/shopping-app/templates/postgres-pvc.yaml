{{- if .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: postgres-data

  labels:
    {{- include "shopping-app.labels" . | nindent 4 }}

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
{{- end }}
