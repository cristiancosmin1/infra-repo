apiVersion: v1
kind: Service

metadata:
  name: {{ include "shopping-app.fullname" . }}

  labels:
    {{- include "shopping-app.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "shopping-app.selectorLabels" . | nindent 4 }}

  ports:
    - port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

      protocol: TCP
